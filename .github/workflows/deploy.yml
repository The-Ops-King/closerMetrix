name: Deploy (closerMetrix)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── Backend (Cloud Run) ───────────────────────────────────────
  # Builds + deploys the API to Cloud Run via Cloud Build whenever
  # files under Backend/ change on main.
  backend:
    runs-on: ubuntu-latest
    concurrency:
      group: backend-deploy
      cancel-in-progress: false
    env:
      BEFORE_SHA: ${{ github.event.before }}
      AFTER_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Backend changes
        id: changes
        run: |
          if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -q '^Backend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Backend/ changes — skipping Cloud Run deploy."
          fi

      - name: Authenticate to GCP
        if: steps.changes.outputs.changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: steps.changes.outputs.changed == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: closer-automation

      - name: Submit Cloud Build
        if: steps.changes.outputs.changed == 'true'
        run: |
          SHORT_SHA=$(git rev-parse --short "$AFTER_SHA")
          gcloud builds submit \
            --config Backend/cloudbuild.yaml \
            --substitutions=SHORT_SHA="$SHORT_SHA" \
            --project=closer-automation
